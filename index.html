<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tj-Bots | Digital Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background elements -->
    <div class="glow-container">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">Tj-Bots</div>
            <h1>Digital Hub</h1>
            <p class="subtitle">Premium download tools and automation solutions.</p>
        </header>

        <main id="links-container" class="grid">
            <!-- Cards will be injected here -->
            <div class="loader">Loading your workspace...</div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; 2024 Tj-Bots. Powered by Innovation.</p>
                <div class="footer-links">
                    <a href="https://t.me/your_main_channel">Channel</a>
                    <a href="https://t.me/your_support">Support</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        fetch('links.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('links-container');
                container.innerHTML = '';
                data.forEach((link, index) => {
                    const card = document.createElement('a');
                    card.href = link.url;
                    card.target = '_blank';
                    card.className = 'card animate-fade-in';
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    card.innerHTML = `
                        <div class="card-glow"></div>
                        <div class="card-content">
                            <div class="card-icon">${link.name.charAt(0)}</div>
                            <div class="card-info">
                                <h3>${link.name}</h3>
                                <p>${link.description}</p>
                            </div>
                            <div class="card-arrow">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(err => {
                console.error('Error loading links:', err);
                container.innerHTML = '<p class="error">Failed to load tools.</p>';
            });
    </script>
</body>
</html>
